# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kofuz-portfolio
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # SPA: React Router — serve index.html for client-side routes
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Long cache for Vite-hashed assets
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.jpg"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.jpeg"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.png"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.svg"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.webp"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.avif"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: "/**/*.woff2"
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
